# Per-project config for the portable fuko skills (/fuko:issue,
# /fuko:address-pr-reviews, /fuko:overnight-issue-list, /fuko:draft-issue). The
# skill bodies read THIS file at runtime, so the same skills work in any repo —
# a new project just drops in its own .claude/project.toml. Values below are
# fuko-pr's (the tool's own repo, dogfooding the skills).
#
# Keep in sync with .github/workflows/ci.yml (the toolchain commands) and
# .fuko.toml (the review backend) where noted.

[repo]
owner = "lemehmet"
name = "fuko-pr"
url = "https://github.com/lemehmet/fuko-pr"

# Reviewer bots the address-pr-reviews loop waits on / triages. fuko-pr now runs
# the full set on its own PRs: CodeRabbit + Copilot review, and fuko-pr-review
# observes (recursive dogfooding — the tool reviews itself).
#
# The address-pr-reviews loader does hard lookups on [bots.coderabbit].login,
# [bots.fuko_pr].login, [bots.coderabbit].resume_command and [fuko].github_ref,
# so all of those sections must be present even if a reviewer is observe-only.
[bots]
gate_reviewers = ["coderabbit", "copilot"]
# Substring-matched (case-insensitive) against comment author logins. "fuko-"
# matches every fuko reviewer App instance (fuko-dorian[bot], fuko-gray[bot], …)
# so a GitHub-App rename or a second instance can't silently drop fuko findings
# from the §10 reply audit — the finding-detection path (fuko signals) is
# format-based and already login-independent.
triage_logins = ["coderabbitai", "copilot", "fuko-"]

[bots.copilot]
login = "copilot-pull-request-reviewer[bot]"
unresponsive_timeout_ms = 600000   # 10 min (Copilot doesn't self-recover)

[bots.coderabbit]
login = "coderabbitai[bot]"
unresponsive_timeout_ms = 1500000  # 25 min (longer: CR can recover via resume)
resume_command = "@coderabbitai resume"

[bots.fuko_pr]
# Primary fuko reviewer instance. The §10 reply audit matches via triage_logins'
# "fuko-" substring (covers all instances); this scalar is only bound to
# $FUKO_PR_LOGIN for display, so the exact instance named here is not critical.
login = "fuko-dorian[bot]"
gated = false   # observe-only: triaged + replied, but not a round-gate participant

[ci]
# Workflow names to ignore in BUILD_STATE (observe-only or bot-review mirrors,
# not merge gates). On this repo the Copilot review surfaces in actions/runs as
# "Running Copilot Code Review" (verified) — NOT the template's "Copilot code
# review" — so match that exact name. "fuko-pr review" is the recursive-dogfood
# A/B self-review (observe-only per [bots.fuko_pr].gated=false); it runs ~30 min
# on every push and must not gate the cycle. CodeRabbit posts check-runs, not
# Actions runs, so it never enters BUILD_STATE and needs no exclusion here. The
# real gate left is "ci" (ruff + pytest).
excluded_workflow_names = ["Running Copilot Code Review", "fuko-pr review"]

# Local pre-push verification gates + web smoke build. Mirrors .github/workflows/ci.yml.
[toolchain]
# CI runs both `ruff check .` and `ruff format --check .`; gate on both.
lint_command = "ruff check . && ruff format --check ."
# The full suite needs Postgres (pgvector) + Ollama (bge-m3). `make up` starts
# them via docker-compose; CI provisions the same services. Tune if you run a
# narrower local subset.
test_command = "pytest -q"
# No web frontend — empty means the skill's UI-build step is skipped.
web_build_command = ""

# The `fuko` CLI used for review signals: `uvx --from "$FUKO_REF" fuko status`.
# RECURSIVE CASE — this repo IS fuko-pr. A pinned commit (main or a release)
# would run an OLDER fuko while reviewing the very branch that changes fuko's
# review logic; e.g. a fix to `fuko status` couldn't gate its own PR. So we
# point at the local checkout: uvx builds the working tree / PR branch, and the
# code under review is the code doing the reviewing. The trade-off: a branch
# that breaks the `fuko` CLI breaks its own review loop (acceptable — and a
# signal you'd want). For any OTHER repo this would instead be a pinned
# immutable commit, e.g. "git+https://github.com/lemehmet/fuko-pr@<sha>".
[fuko]
github_ref = "."

[commit]
# {round} and {pr} are substituted by the skill.
round_message_template = "Address round {round} review on PR #{pr}"

[issue]
# Follow-up back-link prefixes (the deferred-finding audit greps for these).
followup_prefix_with_originating = "Follow-up from #{issue}"
followup_prefix_without_originating = "Follow-up from PR #{pr}"

[paths]
scratch_dir = ".agent-scratch"

[merge]
method = "squash"               # matches how #13–#16 were merged
flags = ["admin", "delete-branch"]

# The 'draft / not-ready' label /fuko:draft-issue manages. Does not exist on the
# repo yet; /fuko:draft-issue creates it on first use from this definition.
[labels.proto]
name = "proto"
color = "D4C5F9"
description = "Stub or in-progress draft. Autonomous pipeline must not pick this up."

# Timing knobs. *_ms values are milliseconds.
[timing]
ci_grace_window_ms = 90000              # workflow runs may lag a push ~90s
review_poll_interval_ms = 270000        # 270s: inside the prompt-cache window
rate_limit_wait_ms = 600000             # single longer jump while a reviewer is rate_limited
self_wake_delay_ms = 1200000            # overnight-issue-list self-wake (20 min)
stale_lock_threshold_ms = 1800000       # > self_wake_delay + buffer (30 min)
stall_alarm_threshold_ms = 900000       # PR stuck in ready_for_review (15 min)
