# Build a pinned, multi-arch PR-Agent CLI image and push it to GHCR.
#
# PR-Agent is not pip-installable (its dependency pins conflict), and the public
# codiumai/pr-agent image stops at 0.34. This builds the `cli` target of
# the-pr-agent/pr-agent at a chosen tag for both amd64 and arm64, so fuko's runner
# can use a reproducible, pinned image instead of codiumai/pr-agent:latest.
#
# After it pushes, set in your .fuko.toml:
#   [review]
#   image = "ghcr.io/<owner>/pr-agent:0.38.0"
# and either make the GHCR package public or `docker login ghcr.io` on your runners.
#
# Action refs use version tags for readability; pin them to commit SHAs to match
# this repo's security posture.

name: build pr-agent image

on:
  workflow_dispatch:
    inputs:
      pr_agent_ref:
        description: "the-pr-agent/pr-agent git tag to build (e.g. v0.38.0)"
        default: "v0.38.0"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout PR-Agent source
        uses: actions/checkout@v4
        with:
          repository: the-pr-agent/pr-agent
          ref: ${{ inputs.pr_agent_ref }}

      # Image tags must be lowercase; strip the leading "v" from the git tag.
      - name: Compute image ref
        id: img
        env:
          REF: ${{ inputs.pr_agent_ref }}
          OWNER: ${{ github.repository_owner }}
        run: |
          owner=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          echo "tag=ghcr.io/${owner}/pr-agent:${REF#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3 # arm64 build runs under emulation on the amd64 runner
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (cli target, amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: cli
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.img.outputs.tag }}
          provenance: false # single clean multi-arch manifest, no attestation index
