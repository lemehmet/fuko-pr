name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    # Fork guard: never run untrusted fork-PR code on the persistent homelab fleet.
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: [self-hosted, Linux, X64, fuko-pr] # self-hosted homelab fleet (3 runners)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    # Fork guard: never run untrusted fork-PR code on the persistent homelab fleet.
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: [self-hosted, Linux, X64, fuko-pr] # self-hosted homelab fleet (3 runners)
    # Both services run as ephemeral containers (Docker is on the fleet) with
    # Actions-assigned host ports, so nothing is installed on the persistent host
    # and concurrent jobs can't collide on a fixed 5432/11434.
    services:
      pg:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: fuko
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: fuko
        ports:
          - 5432
        options: >-
          --health-cmd "pg_isready -U fuko"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434
    env:
      FUKO_EMBED_MODEL: bge-m3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev,sqlite]"
      - name: Resolve service endpoints
        env:
          PG_PORT: ${{ job.services.pg.ports['5432'] }}
          OLLAMA_PORT: ${{ job.services.ollama.ports['11434'] }}
        run: |
          {
            echo "FUKO_DATABASE_URL=postgresql://fuko:secret@localhost:${PG_PORT}/fuko"
            echo "FUKO_EMBED_BASE_URL=http://localhost:${OLLAMA_PORT}/v1"
            echo "OLLAMA_URL=http://localhost:${OLLAMA_PORT}"
          } >> "$GITHUB_ENV"
      - name: Pull bge-m3 into the Ollama service
        run: |
          for i in $(seq 1 60); do
            curl -sf "${OLLAMA_URL}/api/tags" >/dev/null && break
            sleep 1
          done
          curl -fsS "${OLLAMA_URL}/api/pull" -d '{"name":"bge-m3"}'
      - run: pytest -q
