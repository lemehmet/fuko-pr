name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    services:
      pg:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: fuko
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: fuko
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fuko"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      FUKO_DATABASE_URL: postgresql://fuko:secret@localhost:5432/fuko
      FUKO_EMBED_BASE_URL: http://127.0.0.1:11434/v1
      FUKO_EMBED_MODEL: bge-m3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev,sqlite]"
      - name: Start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:11434/api/tags >/dev/null && break
            sleep 1
          done
          curl -sf http://127.0.0.1:11434/api/tags
      - run: ollama pull bge-m3
      - run: pytest -q
