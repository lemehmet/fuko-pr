# fuko-pr review workflow — fuko-pr reviewing its OWN PRs (dogfood).
#
# Unlike the distributable template (workflows/pr-review.yml) and the consumer
# repos (shuanda, mepro) — which pin `uvx --from git+...@<commit>` to a released
# fuko-pr — this job runs the runner from the CHECKED-OUT PR code (`uv run fuko`)
# so a PR is reviewed by the very runner it is changing. That is what lets a PR
# that adds a feature (e.g. `[[review.compare]]` A/B) be exercised by that feature.
#
# Runner: the self-hosted homelab fleet (label `fuko-pr`, 3 runners), same as
# shuanda/mepro. It has Docker for PR-Agent's image, reaches the public z.ai /
# Ollama Cloud APIs, AND reaches the LAN knowledge sidecar (FUKO_URL) so the
# review injects learnings from the KB. On GitHub-hosted runners FUKO_URL would
# resolve to an unreachable host and the review would degrade to KB-less — still
# runs, just without injected learnings.
#
# Concurrent A/B under two App identities: branch a (GLM-5.2) posts as fuko-dorian,
# branch b (kimi-k2.7) as fuko-gray. Each App = a repo VARIABLE (App ID) + secret
# (private key): FUKO_DORIAN_APP_ID/FUKO_DORIAN_APP_PRIVATE_KEY and
# FUKO_GRAY_APP_ID/FUKO_GRAY_APP_PRIVATE_KEY. With only one App the A/B runs
# sequentially under it; with none it posts as github-actions[bot]. Observe-only —
# posts reviews, gates nothing.

name: fuko-pr review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: fuko-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Skip drafts, and never run fork-PR head code with this repo's secrets.
    if: ${{ github.event.pull_request.draft == false && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: [self-hosted, Linux, X64, fuko-pr] # self-hosted homelab fleet; reaches the LAN sidecar (FUKO_URL) for KB injection
    # A/B runs two models sequentially; keep this above fuko-pr's per-tool budget
    # so the graceful per-tool timeout + docker kill fire before GitHub cancels.
    timeout-minutes: 40
    permissions:
      contents: read # reads PR data + posts comments only; no commits/pushes
      pull-requests: write
      issues: write
    steps:
      # Two App identities for concurrent A/B: branch a (GLM-5.2) posts as
      # fuko-dorian, branch b (kimi-k2.7) as fuko-gray, so the runner reviews under
      # per-branch tokens (distinct throttle buckets + author separation). Each App
      # is configured by a repo VARIABLE (App ID) + secret (private key); App IDs are
      # variables because the `secrets` context is not allowed in step `if:`.
      # If the gray App is absent the runner degrades to a sequential single-token
      # A/B; if both are absent it falls back to github-actions[bot].
      - name: Mint fuko-dorian app token
        id: app-token-dorian
        if: ${{ vars.FUKO_DORIAN_APP_ID != '' }}
        continue-on-error: true # minting failure (App uninstalled, etc.) falls back rather than failing the PR check
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.FUKO_DORIAN_APP_ID }}
          private-key: ${{ secrets.FUKO_DORIAN_APP_PRIVATE_KEY }}
          permission-contents: read
          permission-pull-requests: write
          permission-issues: write

      - name: Mint fuko-gray app token
        id: app-token-gray
        if: ${{ vars.FUKO_GRAY_APP_ID != '' }}
        continue-on-error: true # absent/failed gray App degrades to sequential single-token A/B
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.FUKO_GRAY_APP_ID }}
          private-key: ${{ secrets.FUKO_GRAY_APP_PRIVATE_KEY }}
          permission-contents: read
          permission-pull-requests: write
          permission-issues: write

      # Bring the PR's code + .fuko.toml into the workspace; the runner is then
      # built from this checkout (dogfood), not a pinned release.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # uv is self-contained and brings its own Python. Pin it.
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.22"

      - name: Review
        env:
          # Base identity (PR reads + the sequential fallback): fuko-dorian.
          GITHUB_TOKEN: ${{ steps.app-token-dorian.outputs.token || github.token }}
          # Per-branch identities for concurrent A/B — referenced by token_env in
          # .fuko.toml. Each is the App token or EMPTY (no github.token fallback):
          # an unminted App must leave its var empty so _resolve_branch_identities
          # falls back to sequential rather than racing fuko-gray against
          # github-actions[bot]. Concurrency activates only when both resolve to
          # distinct actors; otherwise the run is sequential under GITHUB_TOKEN.
          FUKO_GITHUB_TOKEN_DORIAN: ${{ steps.app-token-dorian.outputs.token }}
          FUKO_GITHUB_TOKEN_GRAY: ${{ steps.app-token-gray.outputs.token }}
          # Knowledge base: the LAN fuko sidecar reached from the self-hosted
          # runner. If unreachable the review degrades to KB-less — harmless, just
          # no injected learnings.
          FUKO_URL: ${{ secrets.FUKO_URL }}
          FUKO_TOKEN: ${{ secrets.FUKO_TOKEN }}
          # Reviewer model keys for the .fuko.toml A/B pool: GLM-5.2 via z.ai
          # (zai-coding, branch a) and a model via Ollama Cloud (ollama-cloud,
          # branch b). Separate keys = separate throttle buckets.
          ZAI_KEY: ${{ secrets.ZAI_KEY }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          # Pass the PR URL through the environment rather than expanding
          # ${{ github.event... }} directly in run: (avoids shell injection).
          PR_URL: ${{ github.event.pull_request.html_url }}
        # `uv run` syncs the checkout's deps and runs its `fuko` entry point, so the
        # PR's own runner code performs the review.
        run: uv run fuko review --pr-url "$PR_URL"
