# fuko-pr review workflow — vendor-neutral PR reviewer + RAG knowledge.
#
# Copy this file into your app repo as `.github/workflows/pr-review.yml`, commit
# a `.fuko.toml` (see docs/design.md) choosing your backend + model provider, and
# adjust runs-on. The reviewer model/provider and tools are configured in
# `.fuko.toml`; this workflow only supplies secrets (API keys) and the PR URL.
#
# Posts as the "Fuko PR Review" GitHub App when configured (repo VARIABLE
# FUKO_APP_ID + secret FUKO_APP_PRIVATE_KEY, App installed on the repo); otherwise
# github-actions[bot]. Secrets: FUKO_URL, FUKO_TOKEN (optional), plus the model
# provider's key (e.g. ZAI_KEY or ANTHROPIC_KEY) matching your .fuko.toml.
#
# Concurrent A/B (optional): to have two `[[review.compare]]` branches post under
# separate identities, register a SECOND App and set VARIABLE FUKO_APP_ID_B +
# secret FUKO_APP_PRIVATE_KEY_B; give each compare branch a `token_env`
# (FUKO_GITHUB_TOKEN_A / FUKO_GITHUB_TOKEN_B). Leave FUKO_APP_ID_B unset for the
# default single-identity behavior.

name: fuko-pr review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: fuko-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Skip drafts, and gate on the same-repo fork guard the other self-hosted
    # workflows use — never run fork-PR code on the self-hosted fleet.
    if: ${{ github.event.pull_request.draft == false && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: self-hosted # adjust to a label on your self-hosted runner fleet
    # Hard cap: a slow reasoning model can hang past litellm's request timeout
    # (observed a 361s hang under a 120s setting). Bound the job so a stuck review
    # can't hold a runner slot.
    timeout-minutes: 25
    permissions:
      contents: read # reads PR data + posts comments only; no commits/pushes
      pull-requests: write
      issues: write
    steps:
      # Post as the "Fuko PR Review" GitHub App when configured: set repo VARIABLE
      # FUKO_APP_ID + secret FUKO_APP_PRIVATE_KEY and install the App on the repo.
      # (App ID is a variable, not a secret — the `secrets` context is not allowed
      # in step `if:` conditions, but `vars` is.) Falls back to github-actions[bot].
      - name: Mint Fuko PR Review app token
        id: app-token
        if: ${{ vars.FUKO_APP_ID != '' }}
        continue-on-error: true # if minting fails (App uninstalled, etc.), fall back to github-actions[bot] rather than failing the PR check
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.FUKO_APP_ID }}
          private-key: ${{ secrets.FUKO_APP_PRIVATE_KEY }}
          permission-contents: read
          permission-pull-requests: write
          permission-issues: write

      # Optional second identity for concurrent A/B (see header). No-op unless
      # FUKO_APP_ID_B is set, so the default single-App setup is unaffected.
      - name: Mint second app token (concurrent A/B)
        id: app-token-b
        if: ${{ vars.FUKO_APP_ID_B != '' }}
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.FUKO_APP_ID_B }}
          private-key: ${{ secrets.FUKO_APP_PRIVATE_KEY_B }}
          permission-contents: read
          permission-pull-requests: write
          permission-issues: write

      # Checkout so `.fuko.toml` (the reviewer/model/store config) is available.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      # Only fuko-pr is pip-installed (the runner). PR-Agent itself runs from its
      # Docker image at runtime — `pip install pr-agent` is unsatisfiable (its
      # pins conflict), so Docker must be available on the runner. Until fuko-pr is
      # on PyPI, install from git:
      #   pip install "fuko-pr @ git+https://github.com/<OWNER>/fuko-pr@v0.1.0"
      - name: Install fuko-pr
        run: pip install fuko-pr

      - name: Review
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          # Per-branch identities for concurrent A/B (referenced by token_env in
          # .fuko.toml). Each is the App token or EMPTY (no github.token fallback):
          # an empty var makes the run fall back to sequential under the base token,
          # so an unminted App can't race github-actions[bot] against the other App.
          # When both resolve to distinct actors the branches run concurrently.
          FUKO_GITHUB_TOKEN_A: ${{ steps.app-token.outputs.token }}
          FUKO_GITHUB_TOKEN_B: ${{ steps.app-token-b.outputs.token }}
          # Knowledge base: point at a running sidecar, or omit to use a local store.
          FUKO_URL: ${{ secrets.FUKO_URL }}
          FUKO_TOKEN: ${{ secrets.FUKO_TOKEN }}
          # Model provider key(s) — supply whichever your .fuko.toml selects.
          ZAI_KEY: ${{ secrets.ZAI_KEY }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
        run: fuko review --pr-url "${{ github.event.pull_request.html_url }}"
