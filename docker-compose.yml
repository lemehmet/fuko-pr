services:
  pg:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: fuko
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: fuko
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fuko"]
      interval: 5s
      timeout: 5s
      retries: 20

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

volumes:
  pgdata: {}
  ollama: {}
